<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCA College Portal - Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-center">
      <section class="card login-card">
        <h1>MCA College Portal</h1>
        <p class="muted">Login to manage students and college content.</p>
        <form id="loginForm">
          <label for="username">Username</label>
          <input id="username" name="username" placeholder="admin" required />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="admin123" required />

          <button type="submit">Login</button>
          <p id="loginMessage" class="status"></p>
        </form>

      </section>
    </main>
    <script src="login.js"></script>
  </body>
</html>
