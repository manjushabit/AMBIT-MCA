<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal - Sign Up</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="auth-wrapper">
    <section class="auth-card">
      <h1>Create Your Account</h1>
      <p class="subtitle">Register to access your student dashboard.</p>

      <form id="signupForm" class="form-grid">
        <div class="field">
          <label for="name">Full Name</label>
          <input id="name" name="name" type="text" placeholder="Enter your full name" required>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="name@college.edu" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Create a secure password" minlength="6" required>
        </div>

        <div class="field">
          <label for="place">Place</label>
          <input id="place" name="place" type="text" placeholder="Your city / town" required>
        </div>

        <div class="field">
          <label for="course">Course</label>
          <select id="course" name="course" required>
            <option value="" disabled selected>Select your course</option>
            <option value="B.Tech">B.Tech</option>
            <option value="B.E">B.E</option>
            <option value="BCA">BCA</option>
            <option value="B.Sc Computer Science">B.Sc Computer Science</option>
            <option value="B.Com">B.Com</option>
            <option value="BBA">BBA</option>
            <option value="MBA">MBA</option>
            <option value="MCA">MCA</option>
            <option value="M.Tech">M.Tech</option>
          </select>
        </div>

        <div class="field">
          <label for="mobile">Mobile Number</label>
          <input id="mobile" name="mobile" type="tel" placeholder="10-digit mobile number" pattern="[0-9]{10}" required>
        </div>

        <button type="submit" class="btn-primary">Sign Up</button>
      </form>

      <p class="switch-auth">Already have an account? <a href="login.html">Login here</a></p>
      <p id="signupMessage" class="message"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
