<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VTU Portal — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Mulish:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>



  <!-- ── RIGHT FORM PANEL ── -->
  <div class="form-panel">
    <div class="form-inner">

      <div class="form-header">
        <div class="form-eyebrow">Student Portal</div>
        <div class="form-title">SIGN IN</div>
        <div class="form-sub">Enter your credentials to access your dashboard.</div>
      </div>

      <!-- Error banner -->
      <div class="error-box" id="err">
        <span>⚠</span>
        <span id="err-msg">Please fill all fields.</span>
      </div>

      <form onsubmit="return doLogin(event)">

        <div class="field">
          <label>Full Name</label>
          <input type="text" id="f-name" placeholder="Arjun Mehta" required>
        </div>

        <div class="field">
          <label>Email Address</label>
          <input type="email" id="f-email" placeholder="student@vtu.ac.in" required>
        </div>

        <div class="field">
          <label>Password</label>
          <div class="pass-wrap">
            <input type="password" id="f-pass" placeholder="Min. 6 characters" required>
            <button type="button" class="eye-btn" onclick="toggleEye()">👁</button>
          </div>
        </div>

        <div class="field-row">
          <div class="field" style="margin-bottom:0">
            <label>Course</label>
            <div class="sel-wrap">
              <select id="f-course" required>
                <option value="">Select course</option>
                <option value="MCA">MCA</option>
                <option value="BCA">BCA</option>
                <option value="M.Tech">M.Tech</option>
                <option value="B.Tech">B.Tech</option>
                <option value="MBA">MBA</option>
                <option value="B.Sc CS">B.Sc CS</option>
              </select>
            </div>
          </div>
          <div class="field" style="margin-bottom:0">
            <label>City</label>
            <input type="text" id="f-city" placeholder="Bengaluru">
          </div>
        </div>

        <div style="margin-top:22px">
          <button type="submit" class="submit">Access Dashboard →</button>
        </div>

      </form>

      <div class="demo-hint">
        <strong>Quick demo:</strong> Enter any name · valid email · 6+ char password · pick a course · any city.
        <br>Click <span class="mono">Access Dashboard</span> to proceed.
      </div>

    </div>
  </div><!-- /form-panel -->

  <script src="login.js"></script>
</body>
</html>
