<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — VTU Student Portal</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="inner">
        <a href="index.html" class="brand" aria-label="VTU Student Portal home">
          <span class="brand-mark">VTU</span>
          <span>Student Portal</span>
        </a>
        <nav aria-label="Main navigation">
          <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="register.html" class="active">Register</a></li>
            <li><a href="login.html">Login</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <h1 class="page-title">Student Registration</h1>
      <p class="page-sub">Create your VTU student portal account. Your password is secured using encryption (hashing) before it is stored.</p>

      <div class="card">
        <div id="register-msg" class="msg error hidden" role="alert"></div>
        <form id="register-form" novalidate>
          <div class="form-group">
            <label for="reg-name">Full name</label>
            <input type="text" id="reg-name" name="name" required autocomplete="name" placeholder="As per university records" />
          </div>
          <div class="form-group">
            <label for="reg-email">Email address</label>
            <input type="email" id="reg-email" name="email" required autocomplete="email" placeholder="name@example.com" />
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" name="password" required autocomplete="new-password" minlength="6" placeholder="Minimum 6 characters" />
          </div>
          <div class="form-group">
            <label for="reg-domain">Programme / Domain</label>
            <select id="reg-domain" name="domain" required>
              <option value="">Select programme</option>
              <option value="MCA">MCA — Master of Computer Applications</option>
              <option value="CSE">CSE — Computer Science &amp; Engineering</option>
              <option value="ISE">ISE — Information Science &amp; Engineering</option>
              <option value="ECE">ECE — Electronics &amp; Communication</option>
              <option value="ME">ME — Mechanical Engineering</option>
              <option value="CV">CV — Civil Engineering</option>
              <option value="MBA">MBA — Master of Business Administration</option>
            </select>
          </div>
          <div class="form-group">
            <label for="reg-city">City</label>
            <input type="text" id="reg-city" name="city" required autocomplete="address-level2" placeholder="Your city or campus location" />
          </div>
          <button type="submit" class="btn btn-primary btn-block">Register</button>
        </form>
        <p class="form-footer">Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
      document.getElementById("register-form").addEventListener("submit", async function (e) {
        e.preventDefault();
        const msgEl = document.getElementById("register-msg");
        msgEl.classList.add("hidden");

        const name = document.getElementById("reg-name").value.trim();
        const email = document.getElementById("reg-email").value.trim();
        const password = document.getElementById("reg-password").value;
        const domain = document.getElementById("reg-domain").value;
        const city = document.getElementById("reg-city").value.trim();

        if (!name || !email || !password || !domain || !city) {
          msgEl.textContent = "Please fill in all fields.";
          msgEl.className = "msg error";
          return;
        }
        if (password.length < 6) {
          msgEl.textContent = "Password must be at least 6 characters.";
          msgEl.className = "msg error";
          return;
        }

        const result = await registerUser({ name, email, password, domain, city });
        if (!result.ok) {
          msgEl.textContent = result.message;
          msgEl.className = "msg error";
          return;
        }

        msgEl.textContent = "Registration successful. Redirecting to login…";
        msgEl.className = "msg success";
        msgEl.classList.remove("hidden");
        setTimeout(function () {
          window.location.href = "login.html";
        }, 900);
      });
    </script>
  </body>
</html>
