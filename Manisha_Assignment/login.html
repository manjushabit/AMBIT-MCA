<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — VTU Student Portal</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="inner">
        <a href="index.html" class="brand" aria-label="VTU Student Portal home">
          <span class="brand-mark">VTU</span>
          <span>Student Portal</span>
        </a>
        <nav aria-label="Main navigation">
          <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="login.html" class="active">Login</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <h1 class="page-title">Student Login</h1>
      <p class="page-sub">Sign in with your registered email and password to open your dashboard.</p>

      <div class="card">
        <div id="login-msg" class="msg error hidden" role="alert"></div>
        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="login-email">Email address</label>
            <input type="email" id="login-email" name="email" required autocomplete="email" placeholder="name@example.com" />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" name="password" required autocomplete="current-password" placeholder="Your password" />
          </div>
          <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>
        <p class="form-footer">New student? <a href="register.html">Create an account</a></p>
      </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
      if (getSessionEmail() && getUserByEmail(getSessionEmail())) {
        window.location.replace("dashboard.html");
      }

      document.getElementById("login-form").addEventListener("submit", async function (e) {
        e.preventDefault();
        const msgEl = document.getElementById("login-msg");
        msgEl.classList.add("hidden");

        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;

        if (!email || !password) {
          msgEl.textContent = "Please enter email and password.";
          msgEl.className = "msg error";
          msgEl.classList.remove("hidden");
          return;
        }

        const result = await loginUser(email, password);
        if (!result.ok) {
          msgEl.textContent = result.message;
          msgEl.className = "msg error";
          msgEl.classList.remove("hidden");
          return;
        }

        window.location.href = "dashboard.html";
      });
    </script>
  </body>
</html>
