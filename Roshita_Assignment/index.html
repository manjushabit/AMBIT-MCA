<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VTU Student Portal - Sign Up</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <h1>VTU Student Portal</h1>
      <ul class="nav-links">
        <li><a href="index.html" class="active">Sign Up</a></li>
        <li><a href="login.html">Login</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h2>Student Registration</h2>
      <p class="subtitle">Create your student account to access the portal.</p>

      <form id="registerForm" class="form-grid">
        <label for="name">Full Name</label>
        <input type="text" id="name" required placeholder="Enter your full name">

        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="Enter your email">

        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" placeholder="Minimum 6 characters">

        <label for="domain">Domain</label>
        <select id="domain" required>
          <option value="">Select Domain</option>
          <option value="MCA">MCA</option>
          <option value="Computer Science">Computer Science</option>
          <option value="Information Science">Information Science</option>
          <option value="Electronics">Electronics</option>
          <option value="Mechanical">Mechanical</option>
          <option value="Civil">Civil</option>
        </select>

        <label for="city">City</label>
        <input type="text" id="city" required placeholder="Enter your city">

        <button type="submit">Register</button>
      </form>
      <p id="registerMessage" class="message"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
