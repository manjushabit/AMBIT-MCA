<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="auth-wrapper">
    <section class="auth-card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Login to continue to your dashboard.</p>

      <form id="loginForm" class="form-grid">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" name="email" type="email" placeholder="name@college.edu" required>
        </div>

        <div class="field">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" name="password" type="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn-primary">Login</button>
      </form>

      <p class="switch-auth">New here? <a href="signup.html">Create account</a></p>
      <p id="loginMessage" class="message"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
