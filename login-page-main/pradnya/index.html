<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | NovaDesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-body auth-page">
  <div class="bg-layer bg-login"></div>
  <div class="bg-overlay"></div>

  <header class="floating-topbar">
    <div class="brand">
      <div class="brand-logo">N</div>
      <span>NovaDesk</span>
    </div>
    <button id="themeToggle" class="icon-btn" aria-label="Toggle dark mode" title="Toggle theme">
      <span class="icon">🌙</span>
    </button>
  </header>

  <main class="auth-main">
    <section class="auth-card glass-card animate-pop">
      <div class="card-head">
        <h1>Welcome Back</h1>
        <p>Sign in to continue to your dashboard.</p>
      </div>

      <form id="loginForm" class="auth-form" novalidate>
        <div class="input-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <span class="input-icon" aria-hidden="true">👤</span>
            <input id="username" name="username" type="text" placeholder="Enter username" autocomplete="username" required>
          </div>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon" aria-hidden="true">🔒</span>
            <input id="password" name="password" type="password" placeholder="Enter password" autocomplete="current-password" required>
            <button id="togglePassword" type="button" class="inline-btn" aria-label="Show password">Show</button>
          </div>
        </div>

        <button id="loginBtn" class="btn btn-primary" type="submit">
          <span class="btn-text">Login</span>
          <span class="spinner" aria-hidden="true"></span>
        </button>
      </form>

      <p id="errorMessage" class="error-msg" role="alert" aria-live="polite"></p>

      <div class="auth-foot">
        <small>Demo credentials: <strong>admin/admin123</strong>, <strong>staff1/1234</strong>, <strong>staff2/1234</strong></small>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
